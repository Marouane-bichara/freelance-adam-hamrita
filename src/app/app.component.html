<!-- Particle Background -->
<app-particle-background></app-particle-background>

<!-- Theme Wrapper -->
<div
  class="min-h-screen flex flex-col transition-colors duration-500"
  [class.light-mode]="!themeService.isDarkMode()"
  [class.dark]="themeService.isDarkMode()"
  [class.bg-slate-950]="themeService.isDarkMode()"
  [class.text-slate-50]="themeService.isDarkMode()"
  [class.bg-slate-50]="!themeService.isDarkMode()"
  [class.text-slate-900]="!themeService.isDarkMode()"
>
  <!-- Header -->
  <app-header *ngIf="!showIntro"></app-header>

  <!-- Intro Screen -->
  <app-intro *ngIf="showIntro" (introComplete)="onIntroComplete()"></app-intro>

  <!-- Main Content -->
  <main *ngIf="!showIntro" class="flex-1 relative z-10">
    <app-hero></app-hero>

    <section class="px-4 sm:px-6 lg:px-8 pb-10">
      <div class="max-w-7xl mx-auto bento-grid">
        <div id="about" class="bento-span-2">
          <app-about></app-about>
        </div>

        <div id="gaming">
          <app-gaming></app-gaming>
        </div>

        <div id="music" class="bento-span-3">
          <app-music></app-music>
        </div>

        <div id="content" class="bento-span-2">
          <app-latest-content></app-latest-content>
        </div>

        <div id="contact">
          <app-contact></app-contact>
        </div>
      </div>
    </section>

    <div class="bottom-grounding-fade pointer-events-none"></div>
  </main>

  <!-- Footer -->
  <app-footer *ngIf="!showIntro" class="mt-auto"></app-footer>
</div>
